name: Site Checks

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  internal-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Internal link check
        shell: pwsh
        run: ./scripts/check-site-links.ps1 -SourceDir "$PWD"
